  <body class="fondo-formulario">
    <header>
      <nav>
        <a class="nav-link" href="../../index.html">Home</a>
        <a class="nav-link" href="./sobre-la-serie.html">Sobre la Serie</a>

          >Formulario</a
        >
      </nav>
    </header>

    <form class="relleno" action="confirmacion.html">
      <fieldset class="relleno">
        <legend>Datos Personales</legend>
        <div class="grupo">
          <label> Complete su Nombre </label>
          <input placeholder="Nombre y Apellido" type="text" required />
        </div>
        <div class="grupo">
          <label> Complete su correo electronico </label>
          <input placeholder="Ejemplo@Gmail.com" type="email" required />
        </div>
        <div class="grupo">
          <label> Deja un mensaje </label>
          <textarea
            placeholder="Ingresar el mensaje..."
            name=""
            rows="6"
          ></textarea>
        </div>
      </fieldset>
      <div class="formulario-contenedor-boton">
        <button class="formulario-boton">Enviar</button>
      </div>
    </form>

    
  </body>
